# Merge these snippets into ~/.codex/config.toml as needed.
# Do not blindly replace the whole config.toml on a new machine.

[mcp_servers.serena]
command = "__HOME__/.local/bin/serena"
args = ["start-mcp-server", "--context=codex", "--project-from-cwd", "--enable-web-dashboard=false", "--log-level=WARNING"]

[mcp_servers.serena.env]
PATH = "/opt/homebrew/bin:__HOME__/.local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--no-usage-statistics"]

# Personal/local tool. Adjust this path on another machine before enabling.
[mcp_servers.adoWorkItems]
command = "__HOME__/my-own-script/.venv/bin/python"
args = ["__HOME__/my-own-script/app_ado/mcp_ado_work_items_server.py"]

